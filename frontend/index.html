<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MovieLens</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <nav class="topbar">
        
        <div style="display: flex;align-items: center; gap: 20px;">
            <p style="font-size: 40px; font-weight: bold;cursor: pointer;" onclick="showSection('recommendationsSection')">MovieLens</p>
            <p>Search movies, rate your favorites<br>and get personalized recommendations.</p>
        </div>

        <div style="display: flex;align-items: center; gap: 20px;">
            <button type="button" class="add-movie-link" onclick="showSection('addMovieSection')">➕<span>Add Movie</span></button>

            <div class="top-search">
                <input type="text" id="topSearchInput" placeholder="Search movies...">
                <button type="button" id="topSearchBtn">🔍</button>
            </div>
        </div>
    </nav>

    <main class="container">
    <section id="addMovieSection" class="page-section">
        <h2>Add New Movie</h2>

        <label for="movieTitle">Movie title</label>
        <input type="text" id="movieTitle" placeholder="Example: My Movie">

        <label for="movieGenres">Genres</label>
        <input type="text" id="movieGenres" placeholder="Example: Action|Drama">

        <button type="button" id="addMovieBtn">Add Movie</button>
        <p id="addMovieMessage"></p>
    </section>

    <section id="searchSection" class="page-section">
        <h2>Search Movies</h2>

        <input type="hidden" id="searchInput">
        <p id="searchMessage"></p>

        <table>
            <thead>
                <tr>
                    <th>Movie ID</th>
                    <th>Title</th>
                    <th>Genres</th>
                    <th>Average Rating</th>
                    <th class="rating-column">Your Rating</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="moviesTableBody"></tbody>
        </table>
    </section>

    <section id="recommendationsSection" class="page-section active">
        <h2>Your Session Ratings</h2>
        <table>
            <thead>
                <tr>
                    <th>Movie</th>
                    <th>Rating</th>
                </tr>
            </thead>
            <tbody id="userRatingsTableBody"></tbody>
        </table>
        <button type="button" id="clearRatingsBtn">Clear Ratings</button>
        <h2>Recommendations</h2>

        <button type="button" id="recommendBtn">Get Recommendations</button>
        <p id="recommendMessage"></p>

        <table>
            <thead>
                <tr>
                    <th>Movie ID</th>
                    <th>Title</th>
                    <th>Genres</th>
                    <th>Predicted Rating</th>
                </tr>
            </thead>
            <tbody id="recommendationsTableBody"></tbody>
        </table>
    </section>
    </main>
    <script src="index.js"></script>
</body>
</html>
